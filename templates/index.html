<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incident Response Agent</title>

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-slate-100 min-h-screen">

    <div class="max-w-5xl mx-auto py-12 px-6">

        <div class="bg-white rounded-3xl shadow-2xl overflow-hidden">

            <!-- Header -->
            <div class="bg-gradient-to-r from-blue-700 to-indigo-800 p-10 text-white">

                <h1 class="text-5xl font-bold mb-4">
                    Incident Response Agent
                </h1>

                <p class="text-blue-100 text-lg leading-relaxed max-w-3xl">
                    Upload alerts, logs, metrics, and runbooks to automatically generate
                    AI-powered incident reports, root-cause analysis, timelines,
                    and action plans.
                </p>

            </div>

            <!-- Upload Form -->
            <div class="p-10 space-y-8">

                <form action="/upload" method="post" enctype="multipart/form-data" class="space-y-6">

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                        <div class="bg-slate-50 border border-slate-200 rounded-2xl p-6 hover:shadow-lg transition duration-300">
                            <label class="block text-lg font-semibold text-slate-700 mb-4">
                                alerts.json
                            </label>

                            <input
                                type="file"
                                name="alerts"
                                required
                                class="block w-full text-sm text-slate-700"
                            >
                        </div>

                        <div class="bg-slate-50 border border-slate-200 rounded-2xl p-6 hover:shadow-lg transition duration-300">
                            <label class="block text-lg font-semibold text-slate-700 mb-4">
                                metrics.csv
                            </label>

                            <input
                                type="file"
                                name="metrics"
                                required
                                class="block w-full text-sm text-slate-700"
                            >
                        </div>

                        <div class="bg-slate-50 border border-slate-200 rounded-2xl p-6 hover:shadow-lg transition duration-300">
                            <label class="block text-lg font-semibold text-slate-700 mb-4">
                                chat.txt
                            </label>

                            <input
                                type="file"
                                name="chat"
                                required
                                class="block w-full text-sm text-slate-700"
                            >
                        </div>

                        <div class="bg-slate-50 border border-slate-200 rounded-2xl p-6 hover:shadow-lg transition duration-300">
                            <label class="block text-lg font-semibold text-slate-700 mb-4">
                                runbook.md
                            </label>

                            <input
                                type="file"
                                name="runbook"
                                required
                                class="block w-full text-sm text-slate-700"
                            >
                        </div>

                    </div>

                    <div class="bg-slate-50 border border-slate-200 rounded-2xl p-6 hover:shadow-lg transition duration-300">

                        <label class="block text-lg font-semibold text-slate-700 mb-4">
                            Log Files
                        </label>

                        <input
                            type="file"
                            name="logs"
                            multiple
                            required
                            class="block w-full text-sm text-slate-700"
                        >

                        <p class="mt-3 text-sm text-slate-500">
                            Upload multiple service logs together.
                        </p>

                    </div>

                    <a
                         href="/history"
                         class="block text-center w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-4 rounded-2xl text-lg shadow-xl transition duration-300"
                    >
                       View Incident History
                    </a>

                    <button
                        type="submit"
                        class="w-full bg-gradient-to-r from-blue-700 to-indigo-800 hover:from-blue-800 hover:to-indigo-900 text-white font-bold py-5 rounded-2xl text-lg shadow-xl transition duration-300"
                    >
                        Analyze Incident
                    </button>

                </form>

            </div>

        </div>

    </div>

</body>
</html>
